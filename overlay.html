<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>DJMAX DJ CLASS Overlay</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@700;900&display=swap');

        body {
            background-color: transparent; 
            margin: 0;
            padding: 15px;
            overflow: hidden;
            font-family: 'Noto Sans KR', sans-serif;
            color: white;
        }

        .main-box {
            display: inline-flex;
            flex-direction: column;
            background: rgba(50, 50, 50, 0.85); 
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            gap: 8px;
            
            border: 2px solid transparent;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            box-sizing: border-box;
        }

        .header-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .nickname {
            font-size: 32px;
            font-weight: 900;
            color: #ffffff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        .button-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border: 3px solid #FFD700;
            border-radius: 50%;
            background-color: rgba(0, 0, 0, 0.4);
            font-size: 18px;
            font-weight: 900;
            color: #FFD700;
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 12px;
            white-space: nowrap;
            font-size: 24px;
            font-weight: 700;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.9);
        }

        .label {
            color: #A0D0FF; 
        }

        .value {
            color: #ffffff;
        }

        .power-value {
            font-size: 22px;
            color: #ffffff;
        }

        .box-glow-up {
            animation: border-flash 3s ease-out;
        }

        @keyframes border-flash {
            0% {
                border-color: transparent;
                box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            }
            20% {
                border-color: rgba(144, 238, 144, 0.8); 
                box-shadow: 0 0 15px rgba(144, 238, 144, 0.6), 0 4px 15px rgba(0,0,0,0.5);
            }
            100% {
                border-color: transparent;
                box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            }
        }
    </style>
</head>
<body>

    <div id="main-container" class="main-box">
        <div class="header-container">
            <div id="nickname-text" class="nickname">Loading...</div>
            <div id="button-badge" class="button-badge">-</div>
        </div>
        <div class="info-row">
            <span class="label">CLASS:</span>
            <span id="class-display" class="value">-</span>
            <span class="label">POWER:</span>
            <span id="power-display" class="power-value">-</span>
        </div>
    </div>

    <script>
        const NICKNAME = '뉴김편집'; 
        const BUTTON = '8';        
        const UPDATE_INTERVAL = 60000; 
        
        let lastPower = 0;

        async function updateStats() {
            const url = `https://v-archive.net/api/v2/archive/${encodeURIComponent(NICKNAME)}/djClass/${BUTTON}`;
            
            try {
                const response = await fetch(url);
                const data = await response.json();

                if (data.success) {
                    const currentPower = parseFloat(data.djPowerConversion);
                    
                    document.getElementById('nickname-text').innerText = NICKNAME;
                    document.getElementById('button-badge').innerText = `${BUTTON}B`;
                    document.getElementById('class-display').innerText = data.djClass;
                    
                    document.getElementById('power-display').innerText = currentPower.toFixed(4);

                    if (lastPower > 0 && currentPower > lastPower) {
                        triggerBoxGlow();
                    }

                    lastPower = currentPower;
                } else {
                    document.getElementById('nickname-text').innerText = "DATA NOT FOUND";
                }
            } catch (error) {
                console.error("API Error:", error);
                document.getElementById('nickname-text').innerText = "CONN ERROR";
            }
        }

        function triggerBoxGlow() {
            const container = document.getElementById('main-container');
            container.classList.remove('box-glow-up');
            void container.offsetWidth;
            container.classList.add('box-glow-up');
        }

        updateStats();
        setInterval(updateStats, UPDATE_INTERVAL);
    </script>
</body>
</html>
