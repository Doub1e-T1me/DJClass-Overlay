<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>DJMAX DJ CLASS Overlay</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@700;900&display=swap');

        body {
            background-color: transparent; 
            margin: 0;
            padding: 15px;
            overflow: hidden;
            font-family: 'Noto Sans KR', sans-serif;
            color: white;
        }

        .main-box {
            display: inline-flex;
            flex-direction: column;
            background: rgba(50, 50, 50, 0.85); 
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            gap: 8px;
            
            /* --- 테두리 애니메이션을 위한 기본 설정 추가 --- */
            border: 2px solid transparent; /* 평소에는 투명한 테두리 */
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            box-sizing: border-box; /* 테두리가 생겨도 박스 크기가 변하지 않게 */
        }

        .header-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .nickname {
            font-size: 32px;
            font-weight: 900;
            color: #ffffff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        .button-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border: 3px solid #FFD700;
            border-radius: 50%;
            background-color: rgba(0, 0, 0, 0.4);
            font-size: 18px;
            font-weight: 900;
            color: #FFD700;
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 12px;
            white-space: nowrap;
            font-size: 24px;
            font-weight: 700;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.9);
        }

        .label {
            color: #A0D0FF; 
        }

        .value {
            color: #ffffff;
        }

        .power-value {
            font-size: 22px;
            color: #ffffff;
        }

        /* --- 테두리 반짝임 애니메이션 스타일 추가 --- */
        
        /* 점수가 올랐을 때 .main-box에 추가될 클래스 */
        .box-glow-up {
            animation: border-flash 2s ease-out;
        }

        @keyframes border-flash {
            0% {
                border-color: transparent;
                box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            }
            20% {
                /* 약한 연두색 (LimeGreen 계열) */
                border-color: rgba(144, 238, 144, 0.8); 
                /* 외부 글로우 효과 */
                box-shadow: 0 0 15px rgba(144, 238, 144, 0.6), 0 4px 15px rgba(0,0,0,0.5);
            }
            100% {
                border-color: transparent;
                box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            }
        }
    </style>
</head>
<body>

    <div id="main-container" class="main-box">
        <div class="header-container">
            <div id="nickname-text" class="nickname">Loading...</div>
            <div id="button-badge" class="button-badge">-</div>
        </div>
        <div class="info-row">
            <span class="label">CLASS:</span>
            <span id="class-display" class="value">-</span>
            <span class="label">POWER:</span>
            <span id="power-display" class="power-value">-</span>
        </div>
    </div>

    <script>
        const NICKNAME = '뉴김편집'; 
        const BUTTON = '8';        
        const UPDATE_INTERVAL = 60000; 
        
        let lastPower = 0; // 이전 점수 저장용 변수

        async function updateStats() {
            const url = `https://v-archive.net/api/v2/archive/${encodeURIComponent(NICKNAME)}/djClass/${BUTTON}`;
            
            try {
                const response = await fetch(url);
                const data = await response.json();

                if (data.success) {
                    const currentPower = parseFloat(data.djPowerConversion);
                    
                    document.getElementById('nickname-text').innerText = NICKNAME;
                    document.getElementById('button-badge').innerText = `${BUTTON}B`;
                    document.getElementById('class-display').innerText = data.djClass;
                    
                    // 점수 표시 업데이트 (이전 버전의 숫자 애니메이션 CSS는 제거됨)
                    document.getElementById('power-display').innerText = currentPower.toFixed(4);

                    // 애니메이션 로직: 전체 박스 테두리 글로우
                    if (lastPower > 0 && currentPower > lastPower) {
                        triggerBoxGlow();
                    }

                    lastPower = currentPower; // 현재 점수를 저장
                } else {
                    document.getElementById('nickname-text').innerText = "DATA NOT FOUND";
                }
            } catch (error) {
                console.error("API Error:", error);
                document.getElementById('nickname-text').innerText = "CONN ERROR";
            }
        }

        function triggerBoxGlow() {
            const container = document.getElementById('main-container');
            // 애니메이션 중복 실행 방지를 위해 클래스 제거 후 다시 추가
            container.classList.remove('box-glow-up');
            void container.offsetWidth; // reflow 강제
            container.classList.add('box-glow-up');
        }

        updateStats();
        setInterval(updateStats, UPDATE_INTERVAL);
    </script>
</body>
</html>
